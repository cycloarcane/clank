# Clank Security-Hardened Configuration

# Audio Settings
audio:
  sampling_rate: 16000
  chunk_size: 512
  lookback_chunks: 5
  max_speech_seconds: 15
  min_refresh_seconds: 0.2
  vad_threshold: 0.5
  min_silence_duration_ms: 300

# Security Settings
security:
  require_authentication: true
  enable_https: true
  api_key_length: 32
  max_requests_per_minute: 60
  max_audio_processing_time: 30
  enable_audit_logging: true
  
# Network Settings
network:
  use_service_discovery: true
  mdns_service_name: "_clank-led._tcp.local"
  fallback_timeout: 5.0
  connection_timeout: 10.0
  
# LLM Settings
llm:
  endpoint: "http://127.0.0.1:11434/api/generate"
  model: "qwen3:14b"
  temperature: 0.0
  max_tokens: 150
  timeout: 30.0
  
# Model Settings  
models:
  moonshine_commit: "2501abf"
  verify_checksums: true
  models_directory: "models/moonshine"
  
# Logging
logging:
  level: "INFO"
  file: "logs/clank.log"
  max_size_mb: 10
  backup_count: 5
  audit_file: "logs/audit.log"