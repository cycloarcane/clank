# Clank Security-Hardened Configuration

# Audio Settings
audio:
  sampling_rate: 16000
  chunk_size: 512
  lookback_chunks: 5
  max_speech_seconds: 15
  min_refresh_seconds: 0.2
  vad_threshold: 0.5
  min_silence_duration_ms: 300
  # Wake word: utterances not addressed to this word are discarded without
  # being sent to the LLM, logged, or retained. Fuzzy-matched so STT
  # mishearings (clink/crank/blank...) still trigger.
  wake_word: "clank"
  require_wake_word: true
  # Wake detection engine: "text" (transcribe-then-match) or "openwakeword"
  # (acoustic model gates before STT — lower CPU, true capture gate).
  wake_engine: "openwakeword"
  # openWakeWord settings (used only when wake_engine == "openwakeword").
  # oww_model: builtin name (hey_jarvis / alexa / hey_mycroft / hey_marvin)
  # or a path to a custom-trained .onnx. Default is our locally-trained
  # "hey clank" model (hash-pinned in voice_LED_control.py).
  oww_model: "models/wakeword/hey_clank.onnx"
  # Sensitive on purpose — "hey clank" is rare, so we favour recall (the model
  # sits at ~0.09 false positives/hour). Raise toward 0.5 if it over-triggers.
  oww_threshold: 0.3
  command_timeout_s: 6.0
  # Audio kept before the wake word fires and prepended to the command, so a
  # fast onset (e.g. "all") isn't clipped by wake-detection latency.
  command_preroll_s: 0.5

# Security Settings
security:
  require_authentication: true
  enable_https: true
  api_key_length: 32
  max_requests_per_minute: 60
  max_audio_processing_time: 30
  enable_audit_logging: true
  # Privacy: when false (default) raw transcripts are never logged/persisted —
  # only resolved commands (load -> state) are recorded. Set true to debug.
  log_transcripts: false
  
# MQTT Settings — RGB LED strip control. The ESP32 runs WLED and subscribes to
# its JSON API topic (<device>/api); Clank publishes WLED state objects there.
# The broker (mosquitto) runs on this PC; WLED connects to it at the hotspot
# gateway 10.42.0.1. Credentials come from MQTT_USER / MQTT_PASS in .env.
mqtt:
  broker_host: "127.0.0.1"
  broker_port: 1883
  rgb_set_topic: "wled/clank/api"
  # Save the resulting look into this WLED preset after each command so a mains
  # power-cycle restores it (the device boots into this slot). 0 disables it.
  persist_preset: 1

# Network Settings
network:
  use_service_discovery: true
  mdns_service_name: "_clank-led._tcp.local"
  fallback_timeout: 5.0
  connection_timeout: 10.0
  
# LLM Settings
llm:
  endpoint: "http://127.0.0.1:11434/api/generate"
  model: "qwen3:4b"
  temperature: 0.0
  max_tokens: 150
  timeout: 90.0
  # Force Ollama to return one valid JSON object.
  response_format: "json"
  # Disable "thinking" for reasoning models (required for qwen3 via Ollama).
  # Set to null for models that don't support a think parameter.
  think: false
  
# Model Settings  
models:
  moonshine_commit: "2501abf"
  verify_checksums: true
  models_directory: "models/moonshine"
  
# Logging
logging:
  level: "INFO"
  file: "logs/clank.log"
  max_size_mb: 10
  backup_count: 5
  audit_file: "logs/audit.log"